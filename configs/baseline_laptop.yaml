seed: 42

paths:
  data_root: data
  train_annotation_dir: data/train/annotation
  output_dir: laptop_run

labels:
  - bad_posture
  - bumps
  - soft_pastern
  - x_shape

cameras:
  - top
  - right
  - left
  - rear

model:
  backbone: efficientnet_b0
  pretrained: true
  num_classes: 4

data:
  image_size: 160
  frames_per_camera: 2
  use_bbox_crops: true
  frame_cache_dir: null

train:
  valid_size: 0.2
  batch_size: 2
  num_workers: 0
  epochs: 3
  lr: 0.0003

inference:
  thresholds:
    bad_posture: 0.5
    bumps: 0.5
    soft_pastern: 0.5
    x_shape: 0.5
