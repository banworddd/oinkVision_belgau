seed: 42

paths:
  data_root: data
  train_annotation_dir: data/train/annotation
  output_dir: server_run_v3

labels:
  - bad_posture
  - bumps
  - soft_pastern
  - x_shape

cameras:
  - top
  - right
  - left
  - rear

model:
  backbone: efficientnet_b0
  pretrained: true
  num_classes: 4

data:
  image_size: 224
  frames_per_camera: 4
  use_bbox_crops: true
  frame_cache_dir: frame_cache

augmentation:
  brightness: 0.12
  contrast: 0.12
  saturation: 0.08
  degrees: 4.0
  translate: 0.04
  scale_min: 0.96
  scale_max: 1.04
  affine_prob: 0.5
  bbox_crop_jitter: 0.03
  rear_bbox_crop_jitter: 0.03
  xshape_bbox_crop_jitter: 0.04
  xshape_synthetic_flag_key: is_xshape_augmented
  color_only_for_synthetic_xshape: true
  disable_geometry_for_synthetic_xshape: true

train:
  valid_size: 0.2
  batch_size: 8
  num_workers: 4
  epochs: 10
  lr: 0.0002
  raw_sample_ratio: 0.35
  train_augmentations: true
  use_weighted_sampler: true
  sampler_power: 0.7
  sampler_max_weight: 8.0
  sampler_class_boosts:
    bad_posture: 1.2
    bumps: 1.0
    soft_pastern: 1.8
    x_shape: 3.0
  xshape_index_augmentation:
    enabled: true
    target_xshape_count: 12
    max_copies_per_row: 24
  loss:
    type: asl
    gamma_pos: 0.0
    gamma_neg: 2.0
    clip: 0.03

inference:
  thresholds:
    bad_posture: 0.5
    bumps: 0.5
    soft_pastern: 0.5
    x_shape: 0.5

postprocess:
  enable_geometry_fusion: false
  geometry_fusion:
    bad_posture:
      feature: max_bad_posture_score
      mode: weighted_sum
      alpha: 0.0
    soft_pastern:
      feature: max_soft_pastern_score
      mode: max_scaled
      alpha: 0.5
    x_shape:
      feature: max_xshape_score
      mode: max_scaled
      alpha: 1.0
